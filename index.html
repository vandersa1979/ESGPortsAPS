<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Visualizar Certificado</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary-color:#005f73; --bg-color:#e9ecef; --card-bg:#fff; --text-color:#001219; }
    *{box-sizing:border-box;margin:0;padding:0;font-family:'Roboto',sans-serif;}
    body{background:var(--bg-color);color:var(--text-color);}
    .container{max-width:900px;margin:40px auto;padding:20px;}
    .card{background:var(--card-bg);border-radius:8px;box-shadow:0 4px 10px rgba(0,0,0,0.1);padding:30px;}
    .logo-center{text-align:center;margin-bottom:20px;}
    .logo-center img{max-width:200px;}
    label{display:block;margin:10px 0 5px;font-weight:500;}
    .field{margin-bottom:15px;}
    img.evidence{max-width:100px;margin:5px;}
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo-center"><img src="mavit-logo.png" alt="MAV.IT"></div>
      <h1>Visualizar Certificado</h1>
      <div id="viewForm"></div>
      <button onclick="window.close()">Fechar</button>
    </div>
  </div>
  <script>
    (function(){
      const params=new URLSearchParams(location.search);
      const idx=parseInt(params.get('id'));
      const list=JSON.parse(localStorage.getItem('certificados')||'[]');
      if(isNaN(idx)||!list[idx]){alert('Não encontrado');return;}
      const data=list[idx];
      const formDiv=document.getElementById('viewForm');
      Object.entries(data).forEach(([k,v])=>{
        if(k==='evidencias'){
          if(v&&v.length){
            const evDiv=document.createElement('div');
            v.forEach(src=>{
              const img=document.createElement('img');img.className='evidence';img.src=src;
              evDiv.appendChild(img);
            });
            formDiv.appendChild(evDiv);
          }
        } else {
          const label=document.createElement('label');label.textContent=k.toUpperCase()+':';
          const field=document.createElement('div');field.className='field';field.textContent=v;
          formDiv.append(label,field);
        }
      });
    })();
  </script>
</body>
</html>
