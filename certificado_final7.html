<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AC-BWM - Porto de Santos</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root{--primary-color:#005f73;--accent-color:#0a9396;--bg-color:#e9ecef;--card-bg:#ffffff;--text-color:#001219}
    *{box-sizing:border-box;margin:0;padding:0;font-family:'Roboto',sans-serif}
    body{background:var(--bg-color);color:var(--text-color)}
    .container{max-width:900px;margin:40px auto;padding:20px}
    .card{background:var(--card-bg);border-radius:8px;box-shadow:0 4px 10px rgba(0,0,0,0.1);padding:30px;margin-bottom:20px}
    h1,h2{color:var(--primary-color);margin-bottom:20px}
    label{display:block;margin:10px 0 5px;font-weight:500}
    input,select,textarea,button{width:100%;padding:8px;margin-bottom:15px;border:1px solid #ccc;border-radius:4px}
    button{background:var(--accent-color);color:#fff;border:none;cursor:pointer}
    button:hover{background:var(--primary-color)}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px}
    .full{grid-column:1/-1}
    #form-section,#list-section{display:none}
    #cert-list{list-style:none;padding:0}
    #cert-list li{display:flex;justify-content:space-between;align-items:center;padding:10px;border-bottom:1px solid #ccc}
    .logo-center{text-align:center;margin-bottom:20px}
    .logo-center img{max-width:200px}
  </style>
</head>
<body>
  <div class="container">
    <div id="login-section" class="card">
      <div class="logo-center"><img src="mavit-logo.png" alt="MAV.IT"></div>
      <h1>Login</h1>
      <label for="user">Usuário:</label>
      <input type="text" id="user" placeholder="Usuário">
      <label for="pass">Senha:</label>
      <input type="password" id="pass" placeholder="Senha">
      <button type="button" onclick="login()">Entrar</button>
    </div>

    <div id="form-section" class="card">
      <div class="logo-center"><img src="mavit-logo.png" alt="MAV.IT"></div>
      <h1>Certificação de Conformidade de Água de Lastro (AC‑BWM)</h1>
      <form id="certForm">
        <!-- 1 a 8: campos -->
        <h2>1. Dados do Certificado</h2>
        <div class="grid">
          <div><label>Nº do Certificado:</label><input type="text" name="numero" required></div>
          <div><label>Data de Emissão:</label><input type="date" name="dataEmissao" required></div>
          <div class="full"><label>Local de Emissão:</label><input type="text" name="localEmissao" required></div>
        </div>
        <!-- Demais campos aqui (como nas versões anteriores) -->
        <!-- ... -->
        <div class="full"><button type="submit">Salvar Localmente</button></div>
        <div class="full grid" style="grid-template-columns:1fr 1fr;">
          <button type="button" onclick="showList()">Consultar Certificados</button>
          <button type="button" onclick="generateAllPDF()">Gerar PDF (último gerado)</button>
        </div>
      </form>
    </div>

    <div id="list-section" class="card">
      <h2>Certificados Gerados</h2>
      <ul id="cert-list"></ul>
    </div>
  </div>

  <script>
    function login(){
      if(document.getElementById('user').value==='admin' && document.getElementById('pass').value==='admin123'){
        document.getElementById('login-section').style.display='none';
        document.getElementById('form-section').style.display='block';
      } else { alert('Credenciais incorretas'); }
    }

    document.getElementById('certForm').addEventListener('submit', async function(e){
      e.preventDefault();
      const data={}; new FormData(this).forEach((v,k)=>data[k]=v);
      data.evidencias=[]; for(let f of (this.evidencias?.files||[])){
        data.evidencias.push(await new Promise((res,rej)=>{
          const r=new FileReader();
          r.onload=()=>res(r.result); r.onerror=err=>rej(err); r.readAsDataURL(f);
        }));
      }
      const list=JSON.parse(localStorage.getItem('certificados')||'[]');
      list.push(data);
      localStorage.setItem('certificados',JSON.stringify(list));
      alert('Certificado salvo');
      this.reset();
    });

    function showList(){
      const list=JSON.parse(localStorage.getItem('certificados')||'[]');
      const ul=document.getElementById('cert-list'); ul.innerHTML='';
      list.forEach((item,i)=>{
        const li=document.createElement('li');
        const span=document.createElement('span'); span.textContent=item.numero||('#'+i);
        const btn=document.createElement('button'); btn.textContent='🔍';
        btn.onclick=()=>generatePDFFor(i);
        li.append(span,btn); ul.appendChild(li);
      });
      document.getElementById('list-section').style.display='block';
    }

    async function generatePDFFor(idx){
      const list=JSON.parse(localStorage.getItem('certificados')||'[]');
      const data=list[idx]; if(!data) return;
      // Clonar form
      const origForm=document.getElementById('certForm');
      const clone=origForm.cloneNode(true);
      // Preencher clone
      Object.entries(data).forEach(([k,v])=>{
        if(k!=='evidencias'){
          const input=clone.querySelector(`[name="${k}"]`);
          if(input) input.value=v;
        }
      });
      // Container offscreen
      const container=document.createElement('div');
      container.style.position='absolute'; container.style.top='-10000px';
      container.appendChild(clone); document.body.appendChild(container);
      const { jsPDF }=window.jspdf;
      const doc=new jsPDF({unit:'pt',format:'a4'});
      await doc.html(container, {
        x:20,y:20,
        html2canvas:{scale:0.6,useCORS:true},
        callback:pdf=>{
          pdf.save(`certificado-${data.numero||idx}.pdf`);
          document.body.removeChild(container);
        },
        margin:[20,20,20,20], autoPaging:'text'
      });
    }

    function generateAllPDF(){
      // Gera PDF do último registro
      const list=JSON.parse(localStorage.getItem('certificados')||'[]');
      if(list.length) generatePDFFor(list.length-1);
      else alert('Nenhum certificado salvo');
    }
  </script>
</body>
</html>
